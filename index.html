<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gkAgent — AIで、仕事を変える。</title>
  <meta name="description" content="SIer約20年の業務系開発 × 生成AIエージェント技術。大手の高額ソフトを、手の届く価格で。">
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="gkAgent — AIで、仕事を変える。">
  <meta property="og:description" content="SIer約20年の業務系開発 × 生成AIエージェント技術。大手の高額ソフトを、手の届く価格で。">
  <meta property="og:site_name"   content="gkAgent">
  <meta name="twitter:card"       content="summary_large_image">
  <link rel="stylesheet" href="css/base.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    canvas#neural {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: .45;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(90px);
      z-index: 0;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212,175,55,.09) 0%, transparent 70%);
      top: 40%; left: 50%; transform: translate(-50%, -50%);
    }
    .glow-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(59,130,246,.05) 0%, transparent 70%);
      top: 15%; left: 10%;
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 560px;
    }

    .brand {
      font-size: .75rem;
      letter-spacing: .22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: .85;
    }

    h1 {
      font-size: clamp(2.6rem, 8vw, 4.4rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -.04em;
      margin-bottom: 1.6rem;
    }
    .h1-plain { color: var(--text); }
    .h1-gold {
      background: linear-gradient(135deg, var(--gold) 20%, var(--gold2) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub {
      font-size: 1rem;
      color: var(--muted2);
      line-height: 1.85;
      margin-bottom: 2.8rem;
      word-break: keep-all;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .45rem 1rem;
      margin-bottom: 3rem;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.75); }
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .7rem 1.4rem;
      border-radius: var(--radius-md);
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-decoration: none;
      transition: opacity .2s, transform .2s;
    }
    .btn:hover { opacity: .78; transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #06080f;
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--muted2);
      border: 1px solid var(--border);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 4rem;
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .06em;
    }
  </style>
</head>
<body>
  <canvas id="neural"></canvas>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <main>
    <p class="brand">gkAgent</p>

    <h1>
      <span class="h1-plain">AIで、</span><br>
      <span class="h1-gold">仕事を変える。</span>
    </h1>

    <p class="sub">
      SIer 約20年の業務系開発 × 生成 AI エージェント技術。<br>
      大手の高額ソフトを、手の届く価格で。
    </p>

    <div class="badge">
      <span class="badge-dot"></span>
      コンテンツを整理中です — もうしばらくお待ちください
    </div>

    <div class="links">
      <a class="btn btn-primary" href="https://note.com/gkagent" target="_blank" rel="noopener">
        note でコンテンツを見る
      </a>
      <a class="btn btn-secondary" href="https://zenn.dev/gkjapan" target="_blank" rel="noopener">
        Zenn で技術記事を読む
      </a>
    </div>
  </main>

  <footer>© 2026 gkAgent</footer>

  <script src="js/neural.js"></script>
</body>
</html>
