<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06080f">
  <title>404 — gkAgent</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .wrap { position:relative; z-index:2; padding:2rem 1.25rem; max-width:520px; }
    .num {
      font-size:clamp(6rem, 18vw, 11rem);
      font-weight:900;
      line-height:1;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:.4rem;
      letter-spacing:-.04em;
    }
    .msg  { font-size:1.15rem; font-weight:700; margin-bottom:.6rem; }
    .sub  { font-size:.9rem; color:var(--muted2); margin-bottom:2rem; line-height:1.85; }
  </style>
</head>
<body>
<canvas id="neural-bg"></canvas>
<div class="glow-orb glow-gold-lg"></div>

<div class="wrap">
  <div class="num">404</div>
  <div class="msg">ページが見つかりませんでした。</div>
  <div class="sub">そのページは存在しないか、移動した可能性があります。<br>下のリンクからホームへどうぞ。</div>
  <a href="/" class="btn btn-gold">ホームに戻る →</a>
</div>

<script src="js/neural.js"></script>
</body>
</html>
